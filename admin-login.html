<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الأدمن - شغلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-login-body">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <div class="admin-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>لوحة تحكم شغلي</h1>
                <p>تسجيل دخول المشرفين</p>
            </div>
            
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="adminEmail">
                        <i class="fas fa-envelope"></i> البريد الإلكتروني
                    </label>
                    <input type="email" id="adminEmail" placeholder="أدخل البريد الإلكتروني" required>
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">
                        <i class="fas fa-lock"></i> كلمة المرور
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group remember-me">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>تذكرني</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-admin-login">
                    <i class="fas fa-sign-in-alt"></i> دخول لوحة التحكم
                </button>
            </form>
            
            <div class="admin-login-footer">
                <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للموقع</a>
            </div>
        </div>
        
        <div class="admin-login-bg-text">
            <h2>شغلي</h2>
            <p>أكبر منصة توظيف في اليمن</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="admin.js"></script>
</body>
</html>
